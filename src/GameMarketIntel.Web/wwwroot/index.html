<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameMarketIntel.Web</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="GameMarketIntel.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="blazor-startup-loading"
             role="status"
             aria-live="polite">

            <div class="blazor-startup-loading__symbol"
                 aria-hidden="true">
                <svg viewBox="0 0 48 48">
                    <circle class="blazor-startup-loading__orbit"
                            cx="24"
                            cy="24"
                            r="15">
                    </circle>

                    <circle class="blazor-startup-loading__dot blazor-startup-loading__dot--one"
                            cx="24"
                            cy="9"
                            r="3">
                    </circle>

                    <circle class="blazor-startup-loading__dot blazor-startup-loading__dot--two"
                            cx="37"
                            cy="31"
                            r="3">
                    </circle>

                    <circle class="blazor-startup-loading__dot blazor-startup-loading__dot--three"
                            cx="11"
                            cy="31"
                            r="3">
                    </circle>
                </svg>
            </div>

            <div class="blazor-startup-loading__content">
                <strong><strong>Game Market Intelligence</strong></strong>

                <span>
                Preparing your market research workspace...
            </span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>

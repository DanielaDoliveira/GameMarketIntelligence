<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameMarketIntel.Web</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="GameMarketIntel.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div id="app">
            <main class="startup-screen"
                  role="status"
                  aria-live="polite"
                  aria-label="Loading Game Market Intelligence">

                <div class="startup-screen__brand"
                     aria-hidden="true">
                    <span class="startup-screen__mark">GMI</span>
                </div>

                <div class="startup-screen__content">
                    <strong class="startup-screen__name">
                        Game Market Intelligence
                    </strong>

                    <span class="startup-screen__message">
                Preparing your market research workspace...
            </span>
                </div>

                <div class="startup-screen__signal"
                     aria-hidden="true">
                    <span class="startup-screen__signal-line"></span>
                </div>
            </main>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>

name: Main Pull Request Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore GameMarketIntel.slnx

      - name: Build solution
        run: >
          dotnet build GameMarketIntel.slnx
          --configuration Release
          --no-restore

      - name: Run unit tests
        run: >
          dotnet test GameMarketIntel.slnx
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~IntegrationTests"

      - name: Run infrastructure integration tests
        run: >
          dotnet test
          tests/GameMarketIntel.Infrastructure.IntegrationTests/GameMarketIntel.Infrastructure.IntegrationTests.csproj
          --configuration Release
          --no-build
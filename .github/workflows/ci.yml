name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore GameMarketIntel.slnx

      - name: Build solution
        run: dotnet build GameMarketIntel.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test GameMarketIntel.slnx --configuration Release --no-build